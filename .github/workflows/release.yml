name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to build or refresh
        required: true
        type: string
      source_ref:
        description: Git ref to checkout for the release build
        required: false
        type: string
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  signing_preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify updater signing credentials
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          tmp_file="$(mktemp)"
          printf 'signing-preflight\n' > "$tmp_file"
          pnpm tauri signer sign "$tmp_file" >/dev/null
          rm -f "$tmp_file" "$tmp_file.sig"

  create_release:
    needs: signing_preflight
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.ensure_release.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}

      - name: Ensure draft release exists
        id: ensure_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --draft \
              --title "Otterly $TAG_NAME" \
              --notes "Desktop release for macOS, Windows, and Linux."
          fi

          release_id=$(gh release view "$TAG_NAME" --json id --jq '.id')

          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  build:
    needs: create_release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - job_name: macos-x64
            os: macos-latest
            target_key: darwin-x86_64
            rust_targets: x86_64-apple-darwin,aarch64-apple-darwin
            bundle_root: src-tauri/target/x86_64-apple-darwin/release/bundle
            args: --target x86_64-apple-darwin
          - job_name: macos-arm64
            os: macos-latest
            target_key: darwin-aarch64
            rust_targets: x86_64-apple-darwin,aarch64-apple-darwin
            bundle_root: src-tauri/target/aarch64-apple-darwin/release/bundle
            args: --target aarch64-apple-darwin
          - job_name: windows-x64
            os: windows-latest
            target_key: windows-x86_64
            rust_targets: ""
            bundle_root: src-tauri/target/release/bundle
            args: ""
          - job_name: linux-x64
            os: ubuntu-22.04
            target_key: linux-x86_64
            rust_targets: ""
            bundle_root: src-tauri/target/release/bundle
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          save-if: ${{ github.event_name == 'push' }}

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf

      - name: Prepare Windows signing inputs
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            "WINDOWS_SIGNING_ENABLED=false" >> $env:GITHUB_ENV
            exit 0
          }

          $certificateDir = Join-Path $env:RUNNER_TEMP "windows-certificate"
          $certificateTextPath = Join-Path $certificateDir "certificate.txt"
          $certificatePath = Join-Path $certificateDir "otterly-signing.pfx"

          New-Item -ItemType Directory -Force -Path $certificateDir | Out-Null
          Set-Content -Path $certificateTextPath -Value $env:WINDOWS_CERTIFICATE
          certutil -decode $certificateTextPath $certificatePath

          "WINDOWS_CERTIFICATE_PATH=$certificatePath" >> $env:GITHUB_ENV
          "WINDOWS_CERTIFICATE_PASSWORD=$env:WINDOWS_CERTIFICATE_PASSWORD" >> $env:GITHUB_ENV
          "WINDOWS_SIGNING_TIMESTAMP_URL=http://timestamp.digicert.com" >> $env:GITHUB_ENV
          "WINDOWS_SIGNING_ENABLED=true" >> $env:GITHUB_ENV

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_CERTIFICATE_PATH: ${{ env.WINDOWS_CERTIFICATE_PATH }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ env.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_SIGNING_TIMESTAMP_URL: ${{ env.WINDOWS_SIGNING_TIMESTAMP_URL }}
        with:
          releaseId: ${{ needs.create_release.outputs.release_id }}
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          releaseDraft: true
          includeUpdaterJson: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Write updater metadata
        shell: bash
        run: |
          node scripts/write_release_metadata.mjs \
            --platform=${{ matrix.target_key }} \
            --bundle-root=${{ matrix.bundle_root }} \
            --output=release-metadata/${{ matrix.job_name }}.json

      - uses: actions/upload-artifact@v4
        with:
          name: release-metadata-${{ matrix.job_name }}
          path: release-metadata/${{ matrix.job_name }}.json
          if-no-files-found: error

  finalize_release:
    needs: [create_release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/download-artifact@v4
        with:
          path: release-metadata
          pattern: release-metadata-*
          merge-multiple: true

      - name: Fetch release asset names
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: gh release view "$TAG_NAME" --json assets --jq '[.assets[].name]' > release-assets.json

      - name: Build updater manifest
        run: |
          node scripts/build_latest_json.mjs \
            --input-dir=release-metadata \
            --release-assets=release-assets.json \
            --repo=${{ github.repository }} \
            --tag=${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }} \
            --output=latest.json

      - name: Upload updater manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: gh release upload "$TAG_NAME" latest.json --clobber

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: gh release edit "$TAG_NAME" --draft=false
